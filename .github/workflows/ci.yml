name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.23"

jobs:
  shellcheck:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: brew install shellcheck
      - name: Run shellcheck
        run: |
          # -S warning: SC1091 "not following" notes on $SCRIPT_DIR-based
          # sources are info-level and not actionable in CI.
          shellcheck -S warning -x \
            rcc \
            install.sh \
            install \
            lib/core/common.sh \
            lib/core/commands.sh \
            bin/*.sh \
            completions/bash/rcc

  go-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "${{ env.GO_VERSION }}"
      - name: Build Go UI
        run: cd ui && go build -o /dev/null ./...

  bats:
    needs: shellcheck
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: brew install bats-core bats-assert bats-support
      - name: Run bats tests
        run: bats tests/
