name: Traffic badge

# GitHub keeps only 14 days of clone traffic, so accumulate it daily into
# .github/traffic/clones-history.json and render a shields endpoint badge.
# Counts both the code repo and the Homebrew tap (brew install clones the tap).
#
# Needs a PAT in the TRAFFIC_TOKEN secret: the traffic API requires admin/push
# access the default GITHUB_TOKEN can't be granted. Without it the job no-ops
# (the badge stays at its last value) instead of failing.
on:
  schedule:
    - cron: "23 4 * * *"   # daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clones:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TRAFFIC_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Accumulate clone traffic (code repo + Homebrew tap)
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: |
          set -uo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::TRAFFIC_TOKEN not set — skipping. Add a PAT (repo scope) as TRAFFIC_TOKEN to auto-update the clones badge."
            exit 0
          fi
          mkdir -p .github/traffic
          hist=.github/traffic/clones-history.json
          [ -f "$hist" ] || echo '{}' > "$hist"

          for r in Raccoon homebrew-raccoon; do
            if ! gh api "repos/${GITHUB_REPOSITORY_OWNER}/$r/traffic/clones" > /tmp/c.json 2>/tmp/err; then
              echo "::warning::traffic API failed for $r: $(cat /tmp/err) — skipping"; exit 0
            fi
            # Merge the 14-day window per repo+day, keeping the max seen (windows
            # overlap, so max avoids double-counting and undercounting).
            jq --arg r "$r" -s '
              .[0] as $h | .[1].clones as $n
              | reduce $n[] as $c ($h;
                  ($r + "|" + ($c.timestamp[0:10])) as $k
                  | .[$k] = { count:   ([.[$k].count   // 0, $c.count]   | max),
                              uniques: ([.[$k].uniques // 0, $c.uniques] | max) })
            ' "$hist" /tmp/c.json > "$hist.new" && mv "$hist.new" "$hist"
          done

          tc=$(jq '[.[].count]   | add // 0' "$hist")
          tu=$(jq '[.[].uniques] | add // 0' "$hist")
          jq -n --argjson c "$tc" --argjson u "$tu" \
            '{schemaVersion:1, label:"git clones", message:"\($c) (\($u) unique)", color:"blue"}' \
            > .github/traffic/clones.json

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/traffic/clones.json "$hist"
          git diff --cached --quiet || git commit -m "chore: update clone traffic badge [skip ci]"
          git push
