name: Release

on:
  push:
    tags: ["v*"]

env:
  TAP_REPO: thousandflowers/homebrew-raccoon
  FORMULA_PATH: Formula/rcc.rb

jobs:
  ci:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: brew install shellcheck
      - name: Run shellcheck
        run: |
          shellcheck -S warning -x \
            rcc install.sh install \
            lib/core/common.sh lib/core/commands.sh \
            lib/audit/checks.sh \
            bin/*.sh completions/bash/rcc
      - name: Install bats
        run: brew install bats-core
      - name: Run bats tests
        run: bats tests/

  release:
    needs: ci
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: ui/go.mod

      - name: Build universal Go TUI binary
        run: |
          cd ui
          GOARCH=arm64 go build -o rcc-ui-arm64 main.go
          GOARCH=amd64 go build -o rcc-ui-amd64 main.go
          lipo -create -output rcc-ui rcc-ui-arm64 rcc-ui-amd64
          cd ..
          cp ui/rcc-ui bin/rcc-ui

      - name: Get version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "## What's Changed" > /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          if [[ -n "$PREV_TAG" ]]; then
            git log "$PREV_TAG..HEAD" --oneline --no-decorate >> /tmp/release-notes.md
          else
            git log --oneline --no-decorate >> /tmp/release-notes.md
          fi

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md \
            bin/rcc-ui \
          || gh release upload "$TAG" bin/rcc-ui --clobber

      - name: Compute tarball SHA256
        id: sha
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$TARBALL_URL" | shasum -a 256 | cut -d' ' -f1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.RACCOONTAPPUSH }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "ERROR: tap token is empty (secret RACCOONTAPPUSH not set?)"
            exit 1
          fi

          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ env.TAP_REPO }}.git" tap-repo
          cd tap-repo

          FORMULA="${{ env.FORMULA_PATH }}"
          if [[ ! -f "$FORMULA" ]]; then
            echo "ERROR: $FORMULA not found in tap repo!"
            exit 1
          fi

          sed -i '' 's/version "[^"]*"/version "'"$VERSION"'"/' "$FORMULA"
          sed -i '' 's|/archive/refs/tags/v[^"]*\.tar\.gz|/archive/refs/tags/'"$TAG"'\.tar\.gz|' "$FORMULA"
          sed -i '' 's/sha256 "[^"]*"/sha256 "'"$SHA256"'"/' "$FORMULA"

          git add "$FORMULA"
          git -c user.name="Raccoon Release Bot" \
             -c user.email="actions@github.com" \
             commit -m "rcc ${TAG}"
          git push
